.report-arrow { color: #bbb; font-size: 1.2rem; }
.report-card:hover .report-arrow { color: var(--accent); }
footer { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 0.85rem; }
footer a { color: var(--accent); }
