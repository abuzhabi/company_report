<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泡泡玛特 — 研究报告</title>
<style>

  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #555;
    --accent: #dc2626;
    --accent-green: #16a34a;
    --accent-yellow: #f59e0b;
    --border: #e0e0e0;
    --tag-bg: #f0f0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 40px 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--accent);
  }
  header h1 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-secondary); font-size: 0.95rem; }
  .stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 20px 0 0;
    font-size: 0.9rem;
    color: var(--text-secondary);
  }
  .stats b { color: var(--accent-green); font-size: 1.2rem; }
  .tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .tag-us { background: #dbeafe; color: #1e40af; }
  .tag-cn { background: #fef3c7; color: #92400e; }
  .tag-hk { background: #fce7f3; color: #9d174d; }
  .tag-jp { background: #f3e8ff; color: #6b21a8; }
  .tag-nz { background: #d1fae5; color: #065f46; }
  .tag-sub { background: #f1f5f9; color: #475569; font-weight: 500; }
  .tag-v22 { background: #dbeafe; color: #1e40af; }
  .tag-buy { background: #dcfce7; color: #065f46; font-weight: 600; }
  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  footer a { color: var(--accent); }
  .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-link:hover { color: var(--accent); }

  .company-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .company-header h2 {
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .company-header .industry {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-top: 6px;
  }
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .report-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .report-card:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .report-icon { font-size: 1.5rem; }
  .report-body { flex: 1; }
  .report-body h4 { font-size: 1.05rem; margin-bottom: 4px; }
  .report-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .report-arrow { color: #bbb; font-size: 1.2rem; }
  .report-card:hover .report-arrow { color: var(--accent); }

  .company-summary {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }
  .company-summary h3 {
    font-size: 1.1rem;
    margin-bottom: 16px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .summary-item .label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-item .value {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }
  .summary-item .value.green { color: var(--accent-green); }
  .summary-item .value.yellow { color: var(--accent-yellow); }

</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="../../index.html">← 返回公司列表</a>

  <div class="company-header">
    <div>
      <h2>泡泡玛特 <span class="tag tag-hk">港交所</span></h2>
      <div class="industry">IP潮玩·全球化消费 · 1 份报告</div>
    </div>
  </div>

  <div class="company-summary">
    <h3>公司概况</h3>
    <div class="summary-grid">
      <div class="summary-item">
        <span class="label">股票代码</span>
        <span class="value">9992.HK</span>
      </div>
      <div class="summary-item">
        <span class="label">当前价格</span>
        <span class="value">153 港元</span>
      </div>
      <div class="summary-item">
        <span class="label">市值</span>
        <span class="value">~2,042 亿港元</span>
      </div>
      <div class="summary-item">
        <span class="label">Fisher 评分</span>
        <span class="value yellow">67/100</span>
      </div>
      <div class="summary-item">
        <span class="label">毛利率</span>
        <span class="value green">72.1%</span>
      </div>
      <div class="summary-item">
        <span class="label">投资建议</span>
        <span class="value green">推荐 — 分批建仓</span>
        </div>
  </div>

  <div class="report-list">

    <div class="report-card" onclick="location.href='2026-07-10_%E6%B3%A1%E6%B3%A1%E7%8E%9B%E7%89%B9_%E6%B7%B1%E5%BA%A6%E5%88%86%E6%9E%90%E6%8A%A5%E5%91%8A.html'">
      <div class="report-icon">📊</div>
      <div class="report-body">
        <h4>深度分析报告 <span class="tag tag-v22">V-2.2</span></h4>
        <div class="report-meta">
          <span class="tag tag-sub">HTML 报告</span>
          <span>📅 2026-07-10</span>
          <span>⭐ Fisher 67/100</span>
          <span class="tag tag-buy">推荐 — 分批建仓</span>
        </div>
      </div>
      <div class="report-arrow">→</div>
    </div>

  </div>

  <footer>
    <p>基于 <a href="#">大灰皮证券研究统一框架</a> · Research Constitution V-2.2 · Evidence First · 仅供研究参考，不构成投资建议</p>
  </footer>
</div>
</body>
</html>
